<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة 999 شركة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-blue-800">قاعدة بيانات الشركات (إدارة كاملة)</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <input id="cName" placeholder="اسم الشركة" class="p-3 border rounded w-full">
            <input id="cNeeds" placeholder="المهن المطلوبة" class="p-3 border rounded w-full">
            <button onclick="addCo()" class="bg-blue-600 text-white p-3 rounded font-bold col-span-full">إضافة شركة جديدة</button>
        </div>

        <table class="w-full text-right border-collapse">
            <thead class="bg-blue-50"><tr><th class="p-3 border">الشركة</th><th class="p-3 border">المهن</th><th class="p-3 border">إجراء</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let companies = JSON.parse(localStorage.getItem('myCompanies')) || [];
        
        function addCo() {
            let n = document.getElementById('cName').value;
            let d = document.getElementById('cNeeds').value;
            if(!n) return alert("يرجى كتابة اسم الشركة");
            companies.push({n, d});
            localStorage.setItem('myCompanies', JSON.stringify(companies));
            render();
        }

        function render() {
            document.getElementById('tableBody').innerHTML = companies.map((c, i) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 border">${c.n}</td>
                    <td class="p-3 border">${c.d}</td>
                    <td class="p-3 border"><button onclick="del(${i})" class="text-red-500 font-bold">حذف</button></td>
                </tr>
            `).join('');
        }
        
        function del(i) { companies.splice(i, 1); localStorage.setItem('myCompanies', JSON.stringify(companies)); render(); }
        render();
    </script>
</body>
</html>
