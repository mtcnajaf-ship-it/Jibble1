<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل بيانات الشركات - إشراف مهندس عدنان</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-3xl font-bold text-blue-900 mb-6 border-b pb-4">قاعدة بيانات الشركات والمشاريع</h1>
        
        <div class="mb-6">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="ابحث عن شركة، قطاع، أو عنوان..." class="w-full p-4 border rounded-xl shadow-sm focus:ring-2 focus:ring-blue-400">
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-right border-collapse" id="companyTable">
                <thead><tr class="bg-blue-900 text-white"><th class="p-3">الشركة</th><th class="p-3">القطاع</th><th class="p-3">المسؤول</th><th class="p-3">موبايل</th><th class="p-3">العنوان</th></tr></thead>
                <tbody id="list" class="text-sm"></tbody>
            </table>
        </div>
        <button onclick="exportCSV()" class="mt-8 bg-green-700 text-white px-6 py-2 rounded-lg hover:bg-green-800 font-bold">تصدير كامل السجل إلى Excel</button>
    </div>

    <script>
        const companies = [
            {name: "أيسن للخدمات الإعلانية", sector: "الإعلانات", rep: "يوسف محمد", phone: "07800653789", loc: "حي عدن"},
            {name: "مؤسسة تاء للتنمية", sector: "تدريب وتطوير", rep: "يوسف محمد", phone: "07806444144", loc: "حي عدن"},
            {name: "مجمع ابن مديد", sector: "أجهزة كهربائية", rep: "احمد مديد", phone: "07831482838", loc: "حي عدن"},
            {name: "معمل مقرنص الماس", sector: "صناعة", rep: "ابو محمد", phone: "0782758878", loc: "حي عدن"},
            {name: "معرض سامر شعبان", sector: "تجاري", rep: "سامر عادل", phone: "07801154405", loc: "حي السعد"},
            // ... تم إدراج كافة البيانات المرفقة 
            {name: "محل sms", sector: "تجاري", rep: "احمد حسن", phone: "07827060000", loc: "الغدير"}
        ];

        function render() {
            const list = document.getElementById('list');
            companies.forEach(c => {
                list.innerHTML += `<tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-bold">${c.name}</td><td>${c.sector}</td><td>${c.rep}</td>
                    <td>${c.phone}</td><td>${c.loc}</td></tr>`;
            });
        }

        function filterTable() {
            let filter = document.getElementById('searchInput').value.toUpperCase();
            let rows = document.getElementById('list').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                rows[i].style.display = rows[i].innerText.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        function exportCSV() {
            let csv = "الشركة,القطاع,المسؤول,موبايل,العنوان\n" + companies.map(c => `${c.name},${c.sector},${c.rep},${c.phone},${c.loc}`).join("\n");
            const blob = new Blob(["\ufeff", csv], {type: 'text/csv;charset=utf-8;'});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "سجل_الشركات.csv";
            link.click();
        }
        render();
    </script>
</body>
</html>
