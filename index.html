<form id="dataForm" style="max-width: 400px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px;">
    <h3 style="text-align: center;">نموذج تسجيل البيانات</h3>
    
    <label for="name">الاسم الثلاثي:</label><br>
    <input type="text" id="name" name="name" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>

    <label for="whatsapp">رقم الواتساب:</label><br>
    <input type="tel" id="whatsapp" name="whatsapp" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>

    <label for="sector">القطاع:</label><br>
    <select id="sector" name="sector" style="width: 100%; padding: 8px; margin-bottom: 20px;">
        <option value="education">التعليم والتدريب</option>
        <option value="agriculture">القطاع الزراعي</option>
        <option value="tech">التقنيات الحديثة</option>
    </select>

    <button type="submit" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">إرسال البيانات</button>
</form>
