<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الشركات - النجف</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">قاعدة بيانات الشركات</h2>
        <form id="form" class="grid gap-2 mb-4">
            <input type="text" id="name" placeholder="اسم الشركة" required class="p-2 border rounded">
            <input type="text" id="needs" placeholder="المهن المطلوبة" required class="p-2 border rounded">
            <button type="submit" class="bg-blue-600 text-white p-2 rounded">حفظ الشركة</button>
        </form>
        <table class="w-full text-right border-t"><tbody id="body"></tbody></table>
    </div>
    <script>
        let data = JSON.parse(localStorage.getItem('data')) || [];
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            data.push({ name: document.getElementById('name').value, needs: document.getElementById('needs').value });
            localStorage.setItem('data', JSON.stringify(data));
            render(); e.target.reset();
        };
        function render() {
            document.getElementById('body').innerHTML = data.map(c => `
                <tr class="border-b"><td class="p-2 font-bold">${c.name}</td><td class="p-2">${c.needs}</td></tr>
            `).join('');
        }
        render();
    </script>
</body>
</html>
