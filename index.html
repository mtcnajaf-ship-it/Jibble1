<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشاريع - مهندس عدنان</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-900">نظام إدارة الشركات</h1>
        <div class="space-y-4">
            <input id="name" type="text" placeholder="اسم الشركة" class="w-full p-2 border rounded">
            <input id="job" type="text" placeholder="المهنة المطلوبة" class="w-full p-2 border rounded">
            <button onclick="addItem()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">إضافة إلى القائمة</button>
        </div>
        <div class="mt-6">
            <h2 class="font-bold mb-2">القائمة:</h2>
            <ul id="list" class="space-y-2"></ul>
        </div>
    </div>
    <script>
        function addItem() {
            const name = document.getElementById('name').value;
            const job = document.getElementById('job').value;
            if(!name || !job) return alert("يرجى ملء الحقول");
            const li = document.createElement('li');
            li.className = "bg-gray-50 p-2 border rounded";
            li.textContent = `${name} - ${job}`;
            document.getElementById('list').appendChild(li);
        }
    </script>
</body>
</html>
